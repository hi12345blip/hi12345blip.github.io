<!DOCTYPE html>
<html>

<head>
  <title>VortexPlay</title>

  <style>

    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      font-size: 60px;
    }

    button {
      background: purple;
      color: white;
      border: none;
      padding: 15px 30px;
      border-radius: 15px;
      font-size: 20px;
      cursor: pointer;

      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px purple;
    }

  </style>
</head>

<body>

  <h1>🎮 VortexPlay</h1>

  <button>Play Game</button>

</body>
</html>
