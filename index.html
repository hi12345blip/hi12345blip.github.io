<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>VortexPlay</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

  <style>

    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: #0a0a0a;
      color: white;
      text-align: center;
      overflow-x: hidden;
    }

    /* PARTICLES BACKGROUND */
    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
      top: 0;
      left: 0;
    }

    /* TITLE */
    h1 {
      font-size: 60px;
      margin-top: 50px;
      animation: fadeIn 2s ease-in-out;
      text-shadow: 0 0 20px purple;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* GAME GRID */
    .container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 50px;
      gap: 20px;
    }

    /* GAME CARD */
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      padding: 20px;
      width: 200px;
      border-radius: 15px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.05);
      box-shadow: 0 0 25px purple;
    }

    /* BUTTON */
    button {
      margin-top: 10px;
      background: purple;
      border: none;
      color: white;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 15px purple;
    }

  </style>
</head>

<body>

  <!-- BACKGROUND -->
  <div id="particles-js"></div>

  <!-- TITLE -->
  <h1>🎮 VortexPlay</h1>
  <p>Cool Game Portal</p>

  <!-- GAMES -->
  <div class="container">

    <div class="card">
      <h2>Game 1</h2>
      <button onclick="alert('Game launching...')">Play</button>
    </div>

    <div class="card">
      <h2>Game 2</h2>
      <button onclick="alert('Game launching...')">Play</button>
    </div>

    <div class="card">
      <h2>Game 3</h2>
      <button onclick="alert('Game launching...')">Play</button>
    </div>

  </div>

  <!-- PARTICLES SCRIPT -->
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

  <script>
    particlesJS("particles-js", {
      particles: {
        number: { value: 60 },
        color: { value: "#a020f0" },
        size: { value: 3 },
        move: { speed: 2 }
      }
    });
  </script>

</body>
</html>
