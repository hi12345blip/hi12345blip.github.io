<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>VortexPlay Games</title>

  <style>

    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0b;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 30px;
      font-size: 40px;
    }

    /* GAME GRID */
    .grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 30px;
    }

    .game {
      background: #1a1a1a;
      width: 180px;
      padding: 15px;
      border-radius: 15px;
      cursor: pointer;
      transition: 0.3s;
    }

    .game:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px purple;
    }

    .game img {
      width: 100%;
      border-radius: 10px;
    }

    /* GAME WINDOW */
    #gameFrame {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .closeBtn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: red;
      color: white;
      border: none;
      padding: 10px;
      cursor: pointer;
      z-index: 10;
    }

  </style>
</head>

<body>

<h1>🎮 VortexPlay Games</h1>

<!-- GAME LIST -->
<div class="grid">

  <div class="game" onclick="openGame('https://scratch.mit.edu/projects/105500895/embed')">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Scratchlogo.svg">
    <p>Scratch Game</p>
  </div>

  <div class="game" onclick="openGame('https://games.crazygames.com/en_US/slope/index.html')">
    <img src="https://img.crazygames.com/games/slope/cover-160x120.png">
    <p>Slope</p>
  </div>

  <div class="game" onclick="openGame('https://games.crazygames.com/en_US/1v1-lol/index.html')">
    <img src="https://img.crazygames.com/games/1v1-lol/cover-160x120.png">
    <p>1v1.lol</p>
  </div>

</div>

<!-- GAME PLAYER -->
<div id="gameFrame">
  <button class="closeBtn" onclick="closeGame()">X Close</button>
  <iframe id="frame"></iframe>
</div>

<script>

function openGame(url) {
  document.getElementById("gameFrame").style.display = "block";
  document.getElementById("frame").src = url;
}

function closeGame() {
  document.getElementById("gameFrame").style.display = "none";
  document.getElementById("frame").src = "";
}

</script>

</body>
</html>
