<!DOCTYPE html>
<html>

<head>
  <title>Hover Animation</title>

  <style>

    body {
      background: #0f0f0f;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    button {
      background: purple;
      color: white;
      border: none;
      padding: 20px 40px;
      font-size: 25px;
      border-radius: 15px;
      cursor: pointer;

      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 25px purple;
    }

  </style>
</head>

<body>

  <button>PLAY</button>

</body>
</html>
