<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>VortexPlay</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

  <style>

    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: #0a0a0a;
      color: white;
      text-align: center;
      overflow-x: hidden;
    }

    /* BACKGROUND */
    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    h1 {
      margin-top: 40px;
      font-size: 55px;
      text-shadow: 0 0 20px purple;
      animation: fadeIn 1.5s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* LAYOUT */
    .container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 30px;
    }

    /* GAME CARD */
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      padding: 20px;
      width: 200px;
      border-radius: 15px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.05);
      box-shadow: 0 0 25px purple;
    }

    button {
      margin-top: 10px;
      background: purple;
      border: none;
      color: white;
      padding: 10px 15px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 15px purple;
    }

    /* INVENTORY */
    .inventory {
      margin-top: 40px;
      padding: 20px;
    }

    .invBox {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    .item {
      background: rgba(0,0,0,0.4);
      border: 1px solid purple;
      padding: 10px 15px;
      border-radius: 10px;
      animation: pop 0.3s ease-in-out;
    }

    @keyframes pop {
      from { transform: scale(0); }
      to { transform: scale(1); }
    }

  </style>
</head>

<body>

<div id="particles-js"></div>

<h1>🎮 VortexPlay</h1>
<p>Game Portal + Inventory System</p>

<!-- GAME SECTION -->
<div class="container">

  <div class="card">
    <h2>Minecraft</h2>
    <button onclick="addItem('Diamond Sword')">Get Reward</button>
  </div>

  <div class="card">
    <h2>Roblox Style Game</h2>
    <button onclick="addItem('Golden Coin')">Get Reward</button>
  </div>

  <div class="card">
    <h2>FPS Game</h2>
    <button onclick="addItem('Sniper Rifle')">Get Reward</button>
  </div>

</div>

<!-- INVENTORY -->
<div class="inventory">
  <h2>🎒 Inventory</h2>

  <button onclick="clearInv()">Clear Inventory</button>

  <div id="invBox" class="invBox"></div>
</div>

<!-- PARTICLES -->
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<script>
particlesJS("particles-js", {
  particles: {
    number: { value: 60 },
    color: { value: "#a020f0" },
    size: { value: 3 },
    move: { speed: 2 }
  }
});
</script>

<!-- INVENTORY SYSTEM -->
<script>

let inventory = JSON.parse(localStorage.getItem("inv")) || [];

function renderInv() {
  const box = document.getElementById("invBox");
  box.innerHTML = "";

  inventory.forEach(item => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerText = item;
    box.appendChild(div);
  });

  localStorage.setItem("inv", JSON.stringify(inventory));
}

function addItem(item) {
  inventory.push(item);
  renderInv();
}

function clearInv() {
  inventory = [];
  renderInv();
}

renderInv();

</script>

</body>
</html>
